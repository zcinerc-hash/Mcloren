<style>
    /* WIDGET SMS CHAT - Estilos Flutuantes */
    .sms-chat-widget {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;

    .sms-chat-button {

    .sms-chat-button:hover {

        animation: slideUp 0.3s ease-out;
    }

    .sms-chat-container.active {
        display: flex;
    }

    @keyframes slideUp {
        from {
            transform: translateY(20px);
            opacity: 0;
        }

    .sms-chat-header {

    .sms-logo-box {

        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        color: #fff;
    }

    .sms-header-info {

    .sms-header-title {

    .sms-online-dot {

    .sms-header-subtitle {
        font-size: 12px;

        color: #fff;

    .sms-close-btn {

        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;

    }

    .sms-close-btn:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .sms-chat-messages {
        flex: 1;
        overflow-y: auto;

    .sms-chat-messages::-webkit-scrollbar {

    .sms-welcome-section {

    .sms-welcome-text {

    .sms-faq-title {

    .sms-message {

    .sms-message-label {

    .sms-message-content {

    .sms-message.admin .sms-message-content {

    .sms-message-time {

    .sms-status-badge {

    .sms-message-image {

    .sms-message-image:hover {

    }

    .sms-image-modal {
        display: none;
        position: fixed;
        z-index: 10002;
        left: 0;

        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
    }

    .sms-image-modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .sms-image-modal-content {
        position: relative;
        max-width: 90%;

    .sms-image-modal-content img {

    }

    }

    .sms-chat-input-area {
        padding: 12px;
        border-top: 1px solid #333;
        background: #111;
        border-radius: 0 0 16px 16px;

    }

    .sms-input-wrapper {
        display: flex;
        gap: 8px;
        align-items: flex-end;
    }

    .sms-message-input {
        flex: 1;
        padding: 10px 12px;
        background: #2a2a2a;
        border: 1px solid #333;
        border-radius: 8px;
        color: #fff;
        font-size: 14px;
        font-family: inherit;
        resize: none;
        max-height: 100px;
    }

    .sms-message-input:focus {
        outline: none;
        border-color: #FF1493;
        background: #333;
    }

    .sms-message-input::placeholder {
        color: #666;
    }

    .sms-input-actions {
        display: flex;
        gap: 6px;
    }

    .sms-action-btn {
        width: 36px;
        height: 36px;
        background: #2a2a2a;
        border: 1px solid #333;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s;
    }

    .sms-action-btn:hover {
        background: #333;
        border-color: #FF1493;
        color: #FF1493;
    }

    .sms-send-btn {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #FF1493 0%, #C71585 100%);
        border: none;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s;
    }

    .sms-send-btn:hover:not(:disabled) {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(255, 20, 147, 0.3);
    }

    .sms-send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .sms-toast-notification {
        position: fixed;
        bottom: 100px;
        right: 30px;
        background: #FF1493;
        color: #fff;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        z-index: 10001;
        animation: toastSlide 0.3s ease-out;
    }

    @keyframes toastSlide {
        from {
            transform: translateX(400px);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    .sms-faq-questions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 320px;
        margin: 0 auto;
    }

    .sms-faq-button {
        background: rgba(255, 20, 147, 0.1);
        border: 1px solid #FF1493;
        color: #FF1493;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.2s;
        text-align: left;
        line-height: 1.3;
    }

    .sms-faq-button:hover {
        background: #FF1493;
        color: #fff;
        transform: translateX(4px);
    }

    .sms-response-notification {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
        color: #000;
        padding: 14px 20px;
        border-radius: 8px;
        font-weight: 600;
        z-index: 10001;
        animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
        from {
            transform: translate(-50%, -100px);
            opacity: 0;
        }
        to {
            transform: translate(-50%, 0);
            opacity: 1;
        }
    }

    @media (max-width: 768px) {
        .sms-chat-container {
            width: 100%;
            height: 100vh;
            bottom: 0;
            right: 0;
            border-radius: 0;
        }

        .sms-message-wrapper {
            max-width: 90%;
        }

        .sms-chat-button {
            width: 50px;
            height: 50px;
        }
    }
</style>

<!-- HTML do Widget -->
<div class="sms-chat-widget" id="smsChatWidget">
    <!-- Botão Flutuante -->
    <button class="sms-chat-button" id="smsChatButton" onclick="window.toggleSmsChat()">
        💬
    </button>

    <!-- Container do Chat -->
    <div class="sms-chat-container" id="smsChatContainer">
        <div class="sms-chat-header">
            <div class="sms-logo-box">PR</div>
            <div class="sms-header-info">
                <div class="sms-header-title">
                    <span>Suporte SMS</span>
                    <div class="sms-online-dot"></div>
                </div>
                <div class="sms-header-subtitle">Respostas automáticas 24/7</div>
            </div>
            <button class="sms-close-btn" onclick="window.closeSmsChat()">✕</button>
        </div>

        <div class="sms-chat-messages" id="smsChatMessages">
            <div class="sms-welcome-section" id="smsWelcomeSection">
                <div class="sms-welcome-icon">💬</div>

                    <div class="sms-faq-questions">
                        <button class="sms-faq-button" onclick="window.sendSmsFAQ('Como funciona o sistema de verificação?')">
                            ❓ Como funciona o sistema de verificação?
                        </button>
                        <button class="sms-faq-button" onclick="window.sendSmsFAQ('Qual é o tempo de resposta do suporte?')">
                            ⏱️ Qual é o tempo de resposta?
                        </button>
                        <button class="sms-faq-button" onclick="window.sendSmsFAQ('Como faço para recuperar minha conta?')">

                        </button>

        </div>

        <div class="sms-chat-input-area">

                <button class="sms-send-btn" onclick="window.sendSmsMessage()" id="smsSendBtn">➤</button>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, addDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
        authDomain: "proibidoreplica.firebaseapp.com",
        projectId: "proibidoreplica",
        storageBucket: "proibidoreplica.firebasestorage.app",
        messagingSenderId: "794009646952",
        appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUid = '';
    let unsubscribe = null;
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let messageResponseCounts = {};
    let displayedMessages = new Set();

    function showSmsToast(message) {
        const toast = document.createElement('div');
        toast.className = 'sms-toast-notification';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'toastSlide 0.3s ease-out reverse';
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    function showSmsResponseNotification() {
        const notification = document.createElement('div');
        notification.className = 'sms-response-notification';
        notification.textContent = '✓ Nova mensagem do administrador!';
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.style.animation = 'slideDown 0.3s ease-out reverse';
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }

    window.toggleSmsChat = function() {
        const container = document.getElementById('smsChatContainer');
        container.classList.toggle('active');
    };

    window.closeSmsChat = function() {
        document.getElementById('smsChatContainer').classList.remove('active');
    };

    function getLocalMessages() {
        const stored = localStorage.getItem(`sms_${currentUid}`);
        return stored ? JSON.parse(stored) : [];
    }

    function saveLocalMessage(msg) {
        const messages = getLocalMessages();
        messages.push(msg);
        localStorage.setItem(`sms_${currentUid}`, JSON.stringify(messages));
    }

    function updateLocalMessage(docId, updates) {
        const messages = getLocalMessages();
        const index = messages.findIndex(m => m.id === docId);
        if (index !== -1) {
            messages[index] = { ...messages[index], ...updates };
            localStorage.setItem(`sms_${currentUid}`, JSON.stringify(messages));
        }
    }

    window.displaySmsMessage = function(msg, docId) {
        const messagesDiv = document.getElementById('smsChatMessages');
        
        if (displayedMessages.has(docId)) {
            return;
        }

        displayedMessages.add(docId);

        const messageDiv = document.createElement('div');
        messageDiv.className = 'sms-message-group';
        messageDiv.id = `sms-msg-${docId}`;

        const msgEl = document.createElement('div');
        msgEl.className = `sms-message ${msg.sender === 'user' ? 'user' : 'admin'}`;

        const wrapper = document.createElement('div');
        wrapper.className = 'sms-message-wrapper';

        const time = msg.createdAt ? new Date(msg.createdAt).toLocaleTimeString('pt-AO', { hour: '2-digit', minute: '2-digit' }) : '';

        const label = document.createElement('div');
        label.className = 'sms-message-label';
        label.textContent = msg.sender === 'user' ? '📱 Você' : '👨‍💼 Administrador';
        wrapper.appendChild(label);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'sms-message-content';
        
        if (msg.type === 'image') {
            const img = document.createElement('img');
            img.src = msg.content;
            img.alt = 'Imagem';
            img.className = 'sms-message-image';
            img.style.cursor = 'pointer';
            img.onclick = function() {
                window.openSmsImageModal(msg.content);
            };
            contentDiv.appendChild(img);
        } else if (msg.type === 'audio') {
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.style.maxWidth = '250px';
            const source = document.createElement('source');
            source.src = msg.content;
            source.type = 'audio/webm';
            audio.appendChild(source);
            contentDiv.appendChild(audio);
        } else {
            contentDiv.textContent = msg.content;
        }
        
        wrapper.appendChild(contentDiv);

        const timeDiv = document.createElement('div');
        timeDiv.className = 'sms-message-time';
        timeDiv.textContent = time;
        
        if (msg.sender === 'user') {
            const badge = document.createElement('span');
            badge.className = 'sms-status-badge';
            badge.textContent = msg.status === 'read' ? '✓✓ Lido' : '✓ Enviado';
            badge.id = `sms-status-${docId}`;
            timeDiv.appendChild(badge);
        }
        wrapper.appendChild(timeDiv);

        msgEl.appendChild(wrapper);
        messageDiv.appendChild(msgEl);
        messagesDiv.appendChild(messageDiv);

        messageResponseCounts[docId] = 0;

        if (msg.responses && msg.responses.length > 0) {
            msg.responses.forEach((response, idx) => {
                window.displaySmsAdminResponse(docId, response, idx);
                messageResponseCounts[docId]++;
            });
        }

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    };

    window.displaySmsAdminResponse = function(docId, response, idx) {
        const messagesDiv = document.getElementById('smsChatMessages');
        const responseId = `sms-msg-response-${docId}-${idx}`;
        
        if (document.getElementById(responseId)) {
            return;
        }

        const responseDiv = document.createElement('div');
        responseDiv.className = 'sms-message-group';
        responseDiv.id = responseId;

        const respMsgEl = document.createElement('div');
        respMsgEl.className = 'sms-message admin';

        const respWrapper = document.createElement('div');
        respWrapper.className = 'sms-message-wrapper';

        const respLabel = document.createElement('div');
        respLabel.className = 'sms-message-label';
        respLabel.textContent = '👨‍💼 Administrador';
        respWrapper.appendChild(respLabel);

        const respContent = document.createElement('div');
        respContent.className = 'sms-message-content';
        
        if (response.type === 'image') {
            const img = document.createElement('img');
            img.src = response.content;
            img.alt = 'Imagem';
            img.className = 'sms-message-image';
            img.style.cursor = 'pointer';
            img.onclick = function() {
                window.openSmsImageModal(response.content);
            };
            respContent.appendChild(img);
        } else if (response.type === 'audio') {
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.style.maxWidth = '250px';
            const source = document.createElement('source');
            source.src = response.content;
            source.type = 'audio/webm';
            audio.appendChild(source);
            respContent.appendChild(audio);
        } else {
            respContent.textContent = response.content;
        }
        
        respWrapper.appendChild(respContent);

        const respTime = response.createdAt ? new Date(response.createdAt).toLocaleTimeString('pt-AO', { hour: '2-digit', minute: '2-digit' }) : '';
        const respTimeDiv = document.createElement('div');
        respTimeDiv.className = 'sms-message-time';
        respTimeDiv.textContent = respTime;
        respWrapper.appendChild(respTimeDiv);

        respMsgEl.appendChild(respWrapper);
        responseDiv.appendChild(respMsgEl);
        messagesDiv.appendChild(responseDiv);

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    };

    window.openSmsImageModal = function(imageSrc) {
        const modal = document.getElementById('smsImageModal');
        const modalImage = document.getElementById('smsModalImage');
        modalImage.src = imageSrc;
        modal.classList.add('active');
    };

    window.closeSmsImageModal = function() {
        const modal = document.getElementById('smsImageModal');
        modal.classList.remove('active');
    };

    window.sendSmsFAQ = async function(question) {
        const input = document.getElementById('smsMessageInput');
        input.value = question;
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 100) + 'px';
        await window.sendSmsMessage();
    };

    window.sendSmsMessage = async function(content = null, type = 'text') {
        const input = document.getElementById('smsMessageInput');
        const textContent = content || input.value.trim();

        if (!textContent) {
            showSmsToast('⚠️ Digite uma mensagem');
            return;
        }

        if (!currentUid) {
            showSmsToast('❌ Usuário não autenticado');
            return;
        }

        document.getElementById('smsSendBtn').disabled = true;

        try {
            const welcomeSection = document.getElementById('smsWelcomeSection');
            if (welcomeSection) {
                welcomeSection.remove();
            }

            const msgData = {
                uid: currentUid,
                content: textContent,
                type: type,
                sender: 'user',
                status: 'sent',
                createdAt: new Date().toISOString(),
                responses: []
            };

            const docRef = await addDoc(collection(db, 'sms'), msgData);

            msgData.id = docRef.id;
            saveLocalMessage(msgData);

            window.displaySmsMessage(msgData, docRef.id);

            input.value = '';
            input.style.height = 'auto';
            document.getElementById('smsSendBtn').disabled = false;
            showSmsToast('✅ Pergunta enviada');
        } catch (e) {
            console.error('Erro ao enviar mensagem:', e);
            showSmsToast('❌ Erro ao enviar');
            document.getElementById('smsSendBtn').disabled = false;
        }
    };

    window.sendSmsImage = async function(file) {
        if (!file) return;

        document.getElementById('smsSendBtn').disabled = true;
        showSmsToast('📤 Enviando imagem...');

        try {
            const storageRef = ref(storage, `sms_images/${currentUid}/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            const downloadURL = await getDownloadURL(storageRef);

            await window.sendSmsMessage(downloadURL, 'image');
        } catch (e) {
            console.error('Erro ao enviar imagem:', e);
            showSmsToast('❌ Erro ao enviar imagem');
            document.getElementById('smsSendBtn').disabled = false;
        }
    };

    window.sendSmsAudio = async function(file) {
        if (!file) return;

        document.getElementById('smsSendBtn').disabled = true;
        showSmsToast('📤 Enviando áudio...');

        try {
            const storageRef = ref(storage, `sms_audios/${currentUid}/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            const downloadURL = await getDownloadURL(storageRef);

            await window.sendSmsMessage(downloadURL, 'audio');
        } catch (e) {
            console.error('Erro ao enviar áudio:', e);
            showSmsToast('❌ Erro ao enviar áudio');
            document.getElementById('smsSendBtn').disabled = false;
        }
    };

    window.startSmsRecording = async function() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const file = new File([audioBlob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                await window.sendSmsAudio(file);
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            isRecording = true;
            document.getElementById('smsAudioBtn').style.background = '#FF1493';
        } catch (e) {
            console.error('Erro ao iniciar gravação:', e);
            showSmsToast('❌ Erro ao acessar microfone');
        }
    };

    window.stopSmsRecording = function() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('smsAudioBtn').style.background = '#2a2a2a';
        }
    };

    function loadLocalMessages() {
        const messagesDiv = document.getElementById('smsChatMessages');
        const welcomeSection = document.getElementById('smsWelcomeSection');
        const localMessages = getLocalMessages();

        if (localMessages.length > 0) {
            if (welcomeSection) {
                welcomeSection.remove();
            }

            localMessages.forEach(msg => {
                window.displaySmsMessage(msg, msg.id);
            });

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    }

    function listenToSmsMessages() {
        try {
            const q = query(
                collection(db, 'sms'),
                where('uid', '==', currentUid)
            );

            unsubscribe = onSnapshot(q, (snapshot) => {
                const allDocs = snapshot.docs.map(doc => ({
                    ...doc.data(),
                    id: doc.id
                }));

                allDocs.sort((a, b) => 
                    new Date(a.createdAt) - new Date(b.createdAt)
                );

                allDocs.forEach(msg => {
                    const docId = msg.id;

                    if (!displayedMessages.has(docId)) {
                        window.displaySmsMessage(msg, docId);
                        updateLocalMessage(docId, msg);
                    } else {
                        const previousCount = messageResponseCounts[docId] || 0;
                        const currentCount = msg.responses ? msg.responses.length : 0;

                        if (currentCount > previousCount) {
                            for (let i = previousCount; i < currentCount; i++) {
                                window.displaySmsAdminResponse(docId, msg.responses[i], i);
                                showSmsResponseNotification();
                            }
                            messageResponseCounts[docId] = currentCount;
                        }

                        const statusBadge = document.querySelector(`#sms-status-${docId}`);
                        if (statusBadge && msg.status) {
                            statusBadge.textContent = msg.status === 'read' ? '✓✓ Lido' : '✓ Enviado';
                        }

                        updateLocalMessage(docId, { 
                            responses: msg.responses || [], 
                            status: msg.status 
                        });
                    }
                });
            }, (error) => {
                console.error('Erro ao escutar:', error);
            });
        } catch (e) {
            console.error('Erro ao configurar listener:', e);
        }
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUid = user.uid;
            messageResponseCounts = {};
            displayedMessages.clear();
            loadLocalMessages();
            listenToSmsMessages();
        }
    });

    document.getElementById('smsMessageInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    document.getElementById('smsMessageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            window.sendSmsMessage();
        }
    });

    document.getElementById('smsImageBtn').addEventListener('click', function() {
        document.getElementById('smsImageInput').click();
    });

    document.getElementById('smsImageInput').addEventListener('change', function(e) {
        if (e.target.files[0]) {
            window.sendSmsImage(e.target.files[0]);
        }
    });

    document.getElementById('smsAudioBtn').addEventListener('click', function() {
        if (!isRecording) {
            window.startSmsRecording();
        } else {
            window.stopSmsRecording();
        }
    });

    document.getElementById('smsImageModal').addEventListener('click', function(e) {
        if (e.target === this) {
            window.closeSmsImageModal();
        }
    });
</script>
