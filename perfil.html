<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Metadados motivacionais -->
  <meta name="title" content="Mclaren Capital — Dia de Vitória">
  <meta name="description" content="Ganhe por referência e conquiste sua vitória financeira com a Mclaren Capital. Uma plataforma de investimento que transforma cada conquista em oportunidade.">
  <meta name="keywords" content="investimentos, referência, vitória, ganhos, plataforma financeira, Mclaren Capital">
  <meta name="author" content="McLaren Capital">

  <!-- Open Graph (Facebook, LinkedIn) -->
  <meta property="og:title" content="Mclaren Capital — Dia de Vitória">
  <meta property="og:description" content="Ganhe por referência e celebre o seu sucesso. Mclaren Capital, onde cada investimento é um passo rumo à vitória.">
  <meta property="og:image" content="/favicon-512x512.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mclaren-capital.onrender.com">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mclaren Capital — Dia de Vitória">
  <meta name="twitter:description" content="Ganhe por referência e conquiste sua vitória financeira com a Mclaren Capital.">
  <meta name="twitter:image" content="/favicon-512x512.png">

  <!-- Ícones e Manifest -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/manifest.json">

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <title>McLaren Capital</title>
    <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#1B3A6B;--navy-dark:#0F2347;--white:#FFFFFF;--off-white:#F8F6F3;--black:#0D0D0D;--gray-soft:#6B6B6B;--gray-line:#E0DEDD;}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--black)}
    .bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#F0F4FF 0%,#EEF2FB 50%,#F5F8FF 100%)}
    .bg-layer::before{content:'';position:absolute;top:-10%;right:-15%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(27,58,107,0.07) 0%,transparent 70%);animation:pbg 8s ease infinite alternate}
    @keyframes pbg{from{transform:scale(1)}to{transform:scale(1.2)}}
    .header{position:sticky;top:0;z-index:100;background:rgba(240,244,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--gray-line);padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
    .back-btn{width:36px;height:36px;border:1.5px solid var(--gray-line);border-radius:10px;background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:var(--black);transition:all .25s;flex-shrink:0}
    .back-btn:hover{border-color:var(--navy);color:var(--navy)}
    .h-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700}
    .content{position:relative;z-index:1;padding:20px 20px 40px;max-width:500px;margin:0 auto}

    /* QR CARD */
    .qr-card{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dark) 100%);border-radius:20px;padding:22px;color:var(--white);margin-bottom:16px;animation:fadeUp .6s ease both;display:flex;align-items:center;gap:20px;position:relative;overflow:hidden}
    .qr-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
    .qr-img-wrap{width:90px;height:90px;background:var(--white);border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:4px}
    .qr-img-wrap img{width:100%;height:100%;border-radius:8px}
    .qr-loader{font-size:10px;color:var(--gray-soft);text-align:center}
    .qr-info-side{flex:1;position:relative;z-index:1}
    .qr-id-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;opacity:.65;margin-bottom:4px}
    .qr-id-val{font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;letter-spacing:.06em;margin-bottom:10px}
    .qr-chips{display:flex;flex-wrap:wrap;gap:6px}
    .qr-chip{background:rgba(255,255,255,.15);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500}
    .qr-chip span{opacity:.65;margin-right:3px;font-size:10px}

    /* PROFILE VIEW */
    .profile-card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--gray-line);box-shadow:0 4px 20px rgba(0,0,0,.04);animation:fadeUp .6s ease .08s both}
    .pc-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-soft);margin-bottom:14px}
    .pc-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-line)}
    .pc-row:last-child{border-bottom:none}
    .pc-icon{width:32px;height:32px;background:rgba(27,58,107,.07);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--navy);flex-shrink:0;margin-right:12px}
    .pc-icon svg{width:14px;height:14px}
    .pc-info-label{font-size:9px;color:var(--gray-soft);letter-spacing:.06em;text-transform:uppercase;margin-bottom:1px}
    .pc-info-val{font-size:13px;font-weight:500}

    /* FORM */
    .form-card{background:var(--white);border-radius:16px;padding:18px;border:1px solid var(--gray-line);box-shadow:0 4px 20px rgba(0,0,0,.04);animation:fadeUp .6s ease .1s both}
    .field{margin-bottom:13px}
    .field label{display:block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-soft);margin-bottom:5px}
    .field input,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--gray-line);border-radius:11px;font-size:13px;font-family:'DM Sans',sans-serif;background:#FAFAF9;color:var(--black);outline:none;transition:all .25s;-webkit-appearance:none}
    .field input:focus,.field select:focus{border-color:var(--navy);background:var(--white);box-shadow:0 0 0 4px rgba(27,58,107,.08)}
    .btn-save{width:100%;padding:13px;background:var(--navy);color:var(--white);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 8px 28px rgba(27,58,107,.28);margin-top:6px}
    .btn-save:hover{background:var(--navy-dark);transform:translateY(-1px)}
    .btn-save:disabled{opacity:.6;cursor:not-allowed;transform:none}

    .notice{background:rgba(27,58,107,.06);border:1px solid rgba(27,58,107,.15);border-radius:11px;padding:11px 14px;font-size:11px;color:var(--navy);line-height:1.6;margin-bottom:14px;animation:fadeUp .6s ease .12s both;display:flex;gap:8px;align-items:flex-start}
    .notice svg{width:14px;height:14px;flex-shrink:0;margin-top:1px}

    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(calc(-100% - 30px));opacity:0;visibility:hidden;background:var(--white);border-radius:13px;padding:12px 18px;box-shadow:0 14px 44px rgba(0,0,0,.13);border-left:4px solid var(--navy);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;z-index:9999;transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s ease,visibility 0s linear .4s;max-width:92vw;pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;pointer-events:all;transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s ease,visibility 0s linear 0s}
    .toast.success{border-left-color:#16A34A}
    .toast.error{border-left-color:var(--navy)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="bg-layer"></div>
<div class="toast" id="toast"><span id="toastMsg"></span></div>

<div class="header">
  <a href="index.html" class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></a>
  <div class="h-title">Meu Perfil</div>
</div>

<div class="content">

  <!-- QR CARD -->
  <div class="qr-card">
    <div class="qr-img-wrap" id="qrWrap">
      <div class="qr-loader">A gerar...</div>
    </div>
    <div class="qr-info-side">
      <div class="qr-id-lbl">ID da Conta</div>
      <div class="qr-id-val" id="qrId">—</div>
      <div class="qr-chips">
        <div class="qr-chip"><span>Plano</span><span id="qrLevel">—</span></div>
        <div class="qr-chip"><span>Afiliados</span><span id="qrRefs">—</span></div>
        <div class="qr-chip"><span>Desde</span><span id="qrDate">—</span></div>
      </div>
    </div>
  </div>

  <!-- PROFILE FILLED -->
  <div id="profileView" style="display:none">
    <div class="profile-card">
      <div class="pc-title">Dados Pessoais</div>
      <div class="pc-row">
        <div class="pc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
        <div><div class="pc-info-label">Nome</div><div class="pc-info-val" id="pName">—</div></div>
      </div>
      <div class="pc-row">
        <div class="pc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
        <div><div class="pc-info-label">Província / Cidade</div><div class="pc-info-val" id="pProvCity">—</div></div>
      </div>
      <div class="pc-row">
        <div class="pc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
        <div><div class="pc-info-label">IBAN · Banco</div><div class="pc-info-val" id="pIbanBank">—</div></div>
      </div>
    </div>
    <div class="notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Perfil bloqueado. Para alterações contacte o suporte.
    </div>
  </div>

  <!-- PROFILE FORM -->
  <div id="profileForm">
    <div class="notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Preencha os seus dados. Após guardar não será possível alterar.
    </div>
    <div class="form-card">
      <div class="field"><label>Nome Completo</label><input type="text" id="fName" placeholder="Ex: João Manuel Ginga"/></div>
      <div class="field"><label>Província</label>
        <select id="fProv">
          <option value="">Selecionar...</option>
          <option>Maputo</option><option>Nampula</option><option>Xai-xai</option><option>Pemba</option>
          <option>Inhambane</option><option>Chimoio</option><option>Matola</option><option>Lichinga</option>
          <option>Beira</option><option>Tete</option><option>Quelimane</option><option>Manica</option>
          <option>Sofala</option><option>Zambezia</option><option>Maputo</option><option>Niassa</option>
          <option>Pemba</option><option>África </option><option>Lisboa (PT)</option><option>Porto (PT)</option>
        </select>
      </div>
      <div class="field"><label>Cidade Actual</label><input type="text" id="fCity" placeholder="Ex: Maputo"/></div>
      <div class="field"><label>Novo Email</label><input type="text" id="fBi" placeholder="Ex: seu@gmail.com"/></div>
      <div class="field"><label>Endereço (para saque)</label><input type="text" id="fIban" placeholder="Escreve aqui seu endereço e selecione seu banco ou carteira"/></div>
      <div class="field"><label>Nome do Banco</label>
        <select id="fBank">
          <option value="">Selecionar...</option>
          <option>Emola</option><option>Mpensa</option>
          <option>Criptomoeda — rede tron 20</option><option>Banco nacional</option>
          <option>BCI</option><option>Express</option><option>Unitelmoney</option>
          <option>Paypay</option><option>Paypal</option><option>Outro</option>
        </select>
      </div>
      <button class="btn-save" id="saveBtn" onclick="saveProfile()">Guardar Perfil</button>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 🔑 Configuração do seu projeto Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
    authDomain: "proibidoreplica.firebaseapp.com",
    projectId: "proibidoreplica",
    storageBucket: "proibidoreplica.firebasestorage.app",
    messagingSenderId: "794009646952",
    appId: "1:794009646952:web:dfdde843496e8a160e88dd"
  };

  // ✅ Inicialização
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  let uid='';

  function generateQR(text){
    const wrap=document.getElementById('qrWrap');
    // Use QR Server API — free, no key needed
    const size=82;
    const url=`https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&bgcolor=ffffff&color=1B3A6B&qzone=1&format=png`;
    const img=document.createElement('img');
    img.src=url;
    img.width=size;img.height=size;
    img.style.borderRadius='6px';
    img.onerror=()=>{wrap.innerHTML='<div class="qr-loader" style="font-size:9px;color:#999">QR indisponível</div>';};
    wrap.innerHTML='';
    wrap.appendChild(img);
  }

  onAuthStateChanged(auth,async user=>{
    if(!user){window.location.href='auth.html';return;}
    uid=user.uid;
    const snap=await getDoc(doc(db,'users',uid));
    if(!snap.exists())return;
    const d=snap.data();

    // QR com ID da conta
    const accountId=d.accountId||'—';
    document.getElementById('qrId').textContent=accountId;
    document.getElementById('qrLevel').textContent=d.level||'G0';
    document.getElementById('qrRefs').textContent=d.referralCount||0;
    if(d.createdAt)document.getElementById('qrDate').textContent=d.createdAt.slice(0,7);
    generateQR(accountId);

    if(d.profileComplete){
      document.getElementById('profileForm').style.display='none';
      document.getElementById('profileView').style.display='block';
      document.getElementById('pName').textContent=d.fullName||'—';
      document.getElementById('pProvCity').textContent=(d.province||'—')+' · '+(d.city||'—');
      document.getElementById('pIbanBank').textContent=(d.iban||'—')+' · '+(d.bankName||'—');
    }
  });

  window.saveProfile=async function(){
    const name=document.getElementById('fName').value.trim();
    const prov=document.getElementById('fProv').value;
    const city=document.getElementById('fCity').value.trim();
    const bi=document.getElementById('fBi').value.trim();
    const iban=document.getElementById('fIban').value.trim();
    const bank=document.getElementById('fBank').value;
    if(!name||!prov||!city||!bi||!iban||!bank){toast('Preencha todos os campos.','error');return;}
    document.getElementById('saveBtn').disabled=true;
    document.getElementById('saveBtn').textContent='A guardar...';
    try{
      await updateDoc(doc(db,'users',uid),{fullName:name,province:prov,city,biNumber:bi,iban,bankName:bank,profileComplete:true});
      toast('Perfil guardado com sucesso!','success');
      setTimeout(()=>window.location.reload(),1500);
    }catch(e){
      toast('Erro ao guardar: '+(e.code||e.message),'error');
      document.getElementById('saveBtn').disabled=false;
      document.getElementById('saveBtn').textContent='Guardar Perfil';
    }
  };
</script>
<script>
  let _tt=null;
  function toast(msg,type){
    if(_tt)clearTimeout(_tt);
    const t=document.getElementById('toast'),m=document.getElementById('toastMsg');
    t.className='toast';m.textContent='';void t.offsetHeight;
    m.textContent=msg;t.className='toast '+(type||'success')+' show';
    _tt=setTimeout(()=>{t.classList.remove('show');_tt=setTimeout(()=>{t.className='toast';},450);},3200);
  }
  window.toast=toast;
</script>
</body>
</html>
