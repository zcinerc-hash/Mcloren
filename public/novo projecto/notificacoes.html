<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlackRock - Notificações</title>
    <style>
        :root {
            --bg-canvas: #0A0C12; --bg-card: #141721; --navbar-bg: #0E1117;
            --borda-nitida: #1A202C; --texto-high: #FFFFFF; --texto-med: #94A3B8;
            --magenta: #EC1A7C; --violeta: #4E3FEA; --gradiente-cta: linear-gradient(135deg, #EC1A7C, #4E3FEA);
            --verde-menta: #38E090; --cyan-neon: #00FFFF; --alerta: #FF4B4B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: var(--bg-canvas); color: var(--texto-high); min-height: 100vh; padding-top: 70px; padding-bottom: 20px; overflow-x: hidden; }

        /* HEADER FIXO */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; background-color: var(--bg-canvas); padding: 15px 20px; border-bottom: 1px solid var(--borda-nitida); z-index: 1000; display: flex; align-items: center; gap: 15px; }
        .btn-voltar { background: none; border: none; color: #FFF; cursor: pointer; display: flex; align-items: center; }
        .header-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; background: var(--gradiente-cta); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .main-content { padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ITEM DE NOTIFICAÇÃO */
        .notif-item { background: var(--bg-card); border: 1px solid var(--borda-nitida); padding: 15px; border-radius: 12px; display: flex; gap: 15px; cursor: pointer; transition: 0.3s; position: relative; text-decoration: none; color: inherit; }
        .notif-item.nao-lida { border-left: 4px solid var(--cyan-neon); background: rgba(0, 255, 255, 0.02); }
        .notif-item:active { background: rgba(255,255,255,0.05); }

        .notif-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        /* Cores por Tipo */
        .icon-chat { background: rgba(78, 63, 234, 0.1); color: var(--violeta); }
        .icon-transacao { background: rgba(56, 224, 144, 0.1); color: var(--verde-menta); }
        .icon-feed { background: rgba(236, 26, 124, 0.1); color: var(--magenta); }
        .icon-rede { background: rgba(0, 255, 255, 0.1); color: var(--cyan-neon); }

        .notif-body { flex-grow: 1; }
        .notif-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .notif-titulo { font-size: 13px; font-weight: 800; color: #FFF; }
        .notif-time { font-size: 10px; color: var(--texto-med); font-weight: 600; }
        .notif-desc { font-size: 12px; color: var(--texto-med); line-height: 1.4; }

        .dot-nao-lida { width: 8px; height: 8px; background: var(--cyan-neon); border-radius: 50%; position: absolute; right: 15px; bottom: 15px; box-shadow: 0 0 8px var(--cyan-neon); }

        /* ESTADO VAZIO */
        .empty-state { text-align: center; padding: 100px 20px; display: none; flex-direction: column; align-items: center; gap: 15px; }
        .empty-state svg { color: var(--borda-nitida); }
        .empty-state p { color: var(--texto-med); font-size: 14px; font-weight: 600; }

        /* LOADING */
        #loading { text-align: center; padding: 20px; color: var(--cyan-neon); font-weight: 800; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>
    <header class="header-fixed">
        <button class="btn-voltar" onclick="window.location.href='dashboard.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <h1 class="header-title">Notificações</h1>
    </header>

    <div id="loading">Sincronizando Terminal...</div>

    <div class="main-content" id="container-notificacoes"></div>

    <div class="empty-state" id="view-vazia">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <p>Nenhuma notificação no momento</p>
    </div>
    
    <script>
        const URL_BASE = 'https://blackrock-gest-o.onrender.com';
        
        window.onload = () => {
            const token = localStorage.getItem('br_token');
            if(!token) { window.location.href = 'login.html'; return; }
            carregarNotificacoes();
            setInterval(carregarNotificacoes, 10000); // Atualiza a cada 10 segundos
        };

        function formatarData(dataISO) {
            const d = new Date(dataISO);
            return d.toLocaleDateString('pt-PT') + ' às ' + d.toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
        }

        // NOVO: Lê o texto e devolve o ícone certo com as SUAS classes de cores!
        function obterEstiloIcone(titulo, mensagem) {
            const txt = (titulo + " " + mensagem).toLowerCase();
            if (txt.includes('aprovado') || txt.includes('sucesso') || txt.includes('concluído')) {
                return { classe: 'icon-transacao', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>' };
            }
            if (txt.includes('rejeitado') || txt.includes('falhou') || txt.includes('fraude') || txt.includes('erro')) {
                return { classe: 'icon-feed', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>' };
            }
            // Padrão (Mensagens e outros)
            return { classe: 'icon-chat', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.5 8.38 8.38 0 0 1 3.8.9L21 3z"></path></svg>' };
        }

        async function carregarNotificacoes() {
            const token = localStorage.getItem('br_token');
            const container = document.getElementById('container-notificacoes');
            const loading = document.getElementById('loading');
            const viewVazia = document.getElementById('view-vazia');

            try {
                const res = await fetch(`${URL_BASE}/api/notificacoes`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const dados = await res.json();
                
                // Trata a resposta se for um array direto ou um objeto com .notifications
                const listaNotificacoes = Array.isArray(dados) ? dados : (dados.notifications || []);
                
                if(loading) loading.style.display = 'none';

                if (listaNotificacoes.length === 0) {
                    if(viewVazia) viewVazia.style.display = 'flex';
                    if(container) container.innerHTML = '';
                    return;
                }

                if(viewVazia) viewVazia.style.display = 'none';

                if(container) {
                    container.innerHTML = listaNotificacoes.map(n => {
                        const iconStyle = obterEstiloIcone(n.titulo, n.mensagem);
                        // Direcionamento dinâmico baseado no tipo de notificação
                        const linkDestino = (n.titulo.toLowerCase().includes('mensagem') || n.titulo.toLowerCase().includes('suporte')) ? 'chat.html' : 'historico.html';

                        return `
                        <div class="notif-item ${n.lida ? '' : 'nao-lida'}" onclick="processarClique('${n._id}', '${linkDestino}')">
                            <div class="notif-icon ${iconStyle.classe}">
                                ${iconStyle.svg}
                            </div>
                            <div class="notif-body">
                                <div class="notif-header">
                                    <span class="notif-titulo" style="color: ${n.lida ? 'var(--texto-high)' : 'var(--cyan-neon)'};">${n.titulo}</span>
                                    <span class="notif-time">${formatarData(n.createdAt)}</span>
                                </div>
                                <div class="notif-desc">${n.mensagem}</div>
                            </div>
                            ${n.lida ? '' : '<div class="dot-nao-lida"></div>'}
                        </div>
                    `}).join('');
                }
            } catch (e) {
                console.error("Erro ao carregar:", e);
                if(loading) loading.innerText = 'Falha de conexão. Tente novamente.';
            }
        }

        async function processarClique(id, link) {
            const token = localStorage.getItem('br_token');
            try {
                await fetch(`${URL_BASE}/api/notificacoes/${id}/ler`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if(link && link !== '#') window.location.href = link;
                else carregarNotificacoes(); 
            } catch(e) {}
        }
    </script>
    <script>
    (function() {
        const isAreaAdmin = window.location.pathname.includes('admin_');
        const TOKEN_KEY = isAreaAdmin ? 'br_admin_token' : 'br_token';
        const URL_LOGIN = isAreaAdmin ? 'admin_login.html' : 'login.html';
        let temporizadorSessao = null;

        function exibirModalExpiracao() {
            if (document.getElementById('modal-expiracao-seguranca')) return;
            const html = `
                <div id="modal-expiracao-seguranca" style="position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.95); z-index: 99999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
                    <div style="background: #0F1219; border: 1px solid #1A202C; border-radius: 16px; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); animation: dropInModal 0.4s ease forwards;">
                        <div style="font-size: 40px; color: #EC1A7C; margin-bottom: 15px;">🔒</div>
                        <h2 style="font-size: 18px; color: #FFF; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 10px;">Sessão Expirada</h2>
                        <p style="font-size: 13px; color: #94A3B8; margin-bottom: 25px; line-height: 1.5;">A sua sessão foi encerrada por medidas de segurança da plataforma.<br>Faça login novamente para continuar.</p>
                        <button onclick="localStorage.clear(); sessionStorage.clear(); window.location.href='${URL_LOGIN}'" style="width: 100%; background: #EC1A7C; color: #FFF; border: none; padding: 15px; border-radius: 10px; font-weight: 900; font-size: 13px; text-transform: uppercase; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(236,26,124,0.3);">Entrar Novamente</button>
                    </div>
                </div>
                <style>@keyframes dropInModal { from { transform: translateY(-20px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }</style>
            `; 
            document.body.insertAdjacentHTML('beforeend', html);
            document.body.style.overflow = 'hidden'; 
        }

        function exibirModalManutencao() {
            if (document.getElementById('modal-manutencao-global')) return;
            // 🛡️ A BARREIRA NEGRA DA BLACKROCK
            document.body.innerHTML = ''; 
            const html = `
                <div id="modal-manutencao-global" style="position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: #05070A; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center;">
                    <div style="width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, rgba(236,26,124,0.1), rgba(78,63,234,0.1)); border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; margin-bottom: 30px;">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--magenta)" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    </div>
                    <h1 style="font-size: 22px; color: #FFF; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px;">Manutenção Global</h1>
                    <div style="display: inline-flex; align-items: center; gap: 8px; background: rgba(246, 224, 94, 0.1); border: 1px solid rgba(246, 224, 94, 0.2); color: #F6E05E; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 25px;">
                        <span style="width: 8px; height: 8px; background: #F6E05E; border-radius: 50%; box-shadow: 0 0 10px #F6E05E; animation: pulseManut 1.5s infinite;"></span>
                        Operação em Andamento
                    </div>
                    <p style="font-size: 14px; color: #94A3B8; max-width: 400px; line-height: 1.6; margin-bottom: 20px;">A plataforma encontra-se temporariamente em manutenção programada.</p>
                    <p style="font-size: 12px; color: #64748B; max-width: 350px; line-height: 1.5;">Estamos realizando melhorias estruturais para oferecer mais estabilidade, segurança e desempenho.<br><br>Por favor, aguarde o sinal da Diretoria.</p>
                </div>
                <style>@keyframes pulseManut { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }</style>
            `;
            document.body.insertAdjacentHTML('beforeend', html);
        }

        function auditarSessao() {
            const tokenAtivo = localStorage.getItem(TOKEN_KEY);
            if (!tokenAtivo && !window.location.pathname.includes('login.html')) {
                window.location.href = URL_LOGIN; return;
            }
            if (tokenAtivo) {
                try {
                    const payload = JSON.parse(atob(tokenAtivo.split('.')[1]));
                    if (Date.now() >= payload.exp * 1000) exibirModalExpiracao();
                    else {
                        clearTimeout(temporizadorSessao);
                        temporizadorSessao = setTimeout(exibirModalExpiracao, (payload.exp * 1000) - Date.now());
                    }
                } catch (e) { localStorage.clear(); window.location.href = URL_LOGIN; }
            }
        }

        window.addEventListener('load', auditarSessao);
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') auditarSessao(); });

        const fetchOriginal = window.fetch;
        window.fetch = async function() {
            const resposta = await fetchOriginal.apply(this, arguments);
            if (resposta.status === 401) {
                exibirModalExpiracao();
            }
            // 🚀 AQUI ESTÁ A MÁGICA: INTERCETAÇÃO DO 503
            if (resposta.status === 503) {
                exibirModalManutencao();
                return new Promise(() => {}); // Mata a promessa e trava o App
            }
            return resposta;
        };
    })();
    </script>
</body>
</html>
