<<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Metadados motivacionais -->
  <meta name="title" content="Mclaren Capital — Dia de Vitória">
  <meta name="description" content="Ganhe por referência e conquiste sua vitória financeira com a Mclaren Capital. Uma plataforma de investimento que transforma cada conquista em oportunidade.">
  <meta name="keywords" content="investimentos, referência, vitória, ganhos, plataforma financeira, Mclaren Capital">
  <meta name="author" content="McLaren Capital">

  <!-- Open Graph (Facebook, LinkedIn) -->
  <meta property="og:title" content="Mclaren Capital — Dia de Vitória">
  <meta property="og:description" content="Ganhe por referência e celebre o seu sucesso. Mclaren Capital, onde cada investimento é um passo rumo à vitória.">
  <meta property="og:image" content="/favicon-512x512.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mclaren-capital.onrender.com">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mclaren Capital — Dia de Vitória">
  <meta name="twitter:description" content="Ganhe por referência e conquiste sua vitória financeira com a Mclaren Capital.">
  <meta name="twitter:image" content="/favicon-512x512.png">

  <!-- Ícones e Manifest -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/manifest.json">

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <title>McLaren Capital</title>
    <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#1B3A6B;--navy-dark:#0F2347;--white:#FFFFFF;--off-white:#F8F6F3;--black:#0D0D0D;--gray-soft:#6B6B6B;--gray-line:#E0DEDD;}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--black)}
    .bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#F0F4FF 0%,#EEF2FB 50%,#F5F8FF 100%)}
    .bg-layer::before{content:'';position:absolute;top:-20%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(27,58,107,0.07) 0%,transparent 70%);animation:pbg 8s ease infinite alternate}
    @keyframes pbg{from{transform:scale(1)}to{transform:scale(1.15)}}
    .header{position:sticky;top:0;z-index:100;background:rgba(240,244,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--gray-line);padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
    .back-btn{width:36px;height:36px;border:1.5px solid var(--gray-line);border-radius:10px;background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:var(--black);transition:all .25s;flex-shrink:0}
    .back-btn:hover{border-color:var(--navy);color:var(--navy)}
    .h-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700}
    .content{position:relative;z-index:1;padding:24px 20px 40px;max-width:500px;margin:0 auto}

    /* MINI CARD — igual ao index.html */
    .summary-card{background:var(--white);border-radius:18px;padding:14px 18px;margin-bottom:16px;border:1px solid var(--gray-line);box-shadow:0 4px 24px rgba(0,0,0,.06);animation:fadeUp .6s ease both;transition:transform .15s ease;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .sc-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
    .sc-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-soft);font-weight:600}
    .sc-amount-row{display:flex;align-items:baseline;gap:5px}
    .sc-total{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:600;color:var(--black);line-height:1;white-space:nowrap;letter-spacing:0}
    .sc-currency{font-size:13px;font-weight:500;color:var(--gray-soft);letter-spacing:0}
    .sc-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .sc-accent{background:var(--navy);border-radius:10px;padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:1px}
    .sc-accent-val{font-size:13px;font-weight:700;color:var(--white);line-height:1;white-space:nowrap}
    .sc-accent-lbl{font-size:9px;color:rgba(255,255,255,.7);letter-spacing:.07em;text-transform:uppercase}

    .hist-card{background:var(--white);border-radius:18px;padding:0;border:1px solid var(--gray-line);box-shadow:0 4px 20px rgba(0,0,0,.04);overflow:hidden;animation:fadeUp .6s ease .1s both}
    .hc-header{padding:18px 20px;border-bottom:1px solid var(--gray-line);display:flex;align-items:center;justify-content:space-between}
    .hc-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-soft)}
    .hist-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--gray-line);animation:fadeUp .4s ease both}
    .hist-item:last-child{border-bottom:none}
    .hi-icon{width:40px;height:40px;background:rgba(22,163,74,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#16A34A;flex-shrink:0}
    .hi-icon svg{width:18px;height:18px}
    .hi-info{flex:1}
    .hi-amount{font-size:15px;font-weight:600;color:var(--black)}
    .hi-date{font-size:11px;color:var(--gray-soft);margin-top:2px}
    .hi-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(22,163,74,.1);color:#16A34A;letter-spacing:.06em}

    .empty-state{padding:40px 20px;text-align:center}
    .empty-icon{width:52px;height:52px;background:rgba(27,58,107,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--navy)}
    .empty-icon svg{width:24px;height:24px}
    .empty-title{font-size:16px;font-weight:600;margin-bottom:6px}
    .empty-sub{font-size:13px;color:var(--gray-soft);line-height:1.6}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="bg-layer"></div>
<div class="header">
  <a href="index.html" class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></a>
  <div class="h-title">Histórico de Rendimento</div>
</div>
<div class="content">

  <div class="summary-card">
    <div class="sc-left">
      <div class="sc-label">Total Acumulado</div>
      <div class="sc-amount-row">
        <div class="sc-total" id="grandTotal">0</div>
        <div class="sc-currency">MT</div>
      </div>
    </div>
    <div class="sc-right">
      <div class="sc-accent">
        <div class="sc-accent-val" id="planLevel">—</div>
        <div class="sc-accent-lbl">Plano</div>
      </div>
    </div>
  </div>

  <!-- stats strip below card -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px;animation:fadeUp .6s ease .06s both">
    <div style="background:var(--white);border-radius:13px;padding:14px 16px;border:1px solid var(--gray-line);box-shadow:0 2px 10px rgba(0,0,0,.04)">
      <div style="font-size:10px;color:var(--gray-soft);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px">Conversões</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:22px;font-weight:600" id="totalDays">0</div>
    </div>
    <div style="background:var(--white);border-radius:13px;padding:14px 16px;border:1px solid var(--gray-line);box-shadow:0 2px 10px rgba(0,0,0,.04)">
      <div style="font-size:10px;color:var(--gray-soft);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px">Taxa Diária</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:22px;font-weight:600" id="dailyRate">0%</div>
    </div>
  </div>

  <div class="hist-card">
    <div class="hc-header">
      <div class="hc-title">Histórico de Conversões</div>
    </div>
    <div id="histList">
      <div class="empty-state">
        <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
        <div class="empty-title">Sem Histórico</div>
        <div class="empty-sub">As suas conversões de rendimento diário aparecerão aqui depois de efectuadas em Finanças.</div>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { 
    getFirestore, doc, getDoc, collection, query, where, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
    authDomain: "proibidoreplica.firebaseapp.com",
    projectId: "proibidoreplica",
    storageBucket: "proibidoreplica.firebasestorage.app",
    messagingSenderId: "794009646952",
    appId: "1:794009646952:web:dfdde843496e8a160e88dd"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  function fmt(n){return Number(Math.round(n)).toLocaleString('pt-AO');}

  function renderHistory(docs) {
    const list = document.getElementById('histList');
    document.getElementById('totalDays').textContent = docs.length;
    
    if(docs.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
          <div class="empty-title">Sem Histórico</div>
          <div class="empty-sub">As suas conversões de rendimento diário aparecerão aqui depois de efectuadas em Finanças.</div>
        </div>
      `;
      return;
    }
    
    list.innerHTML = '';
    let delay = 0;
    
    docs.forEach(e => {
      const dt = e.createdAt?.toDate?.()?.toLocaleString('pt-AO') || '—';
      
      list.innerHTML += `<div class="hist-item" style="animation-delay:${delay}s">
        <div class="hi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <div class="hi-info">
          <div class="hi-amount">+${fmt(e.amount)} MT</div>
          <div class="hi-date">${dt}</div>
        </div>
        <span class="hi-badge">Convertido</span>
      </div>`;
      
      delay += 0.05;
    });
  }

  onAuthStateChanged(auth, async user => {
    if(!user){
      window.location.href='auth.html';
      return;
    }
    
    const snap = await getDoc(doc(db, 'users', user.uid));
    if(!snap.exists()) return;
    
    const d = snap.data();
    document.getElementById('grandTotal').textContent = fmt(d.totalEarned || 0);
    document.getElementById('planLevel').textContent = d.level || '—';
    document.getElementById('dailyRate').textContent = (d.dailyRate || 0) + '%';

    // Load earnings history em TEMPO REAL com onSnapshot
    try {
      const q = query(
        collection(db, 'earnings'),
        where('uid', '==', user.uid)
      );
      
      const unsubscribe = onSnapshot(q, (querySnapshot) => {
        // Ordena no cliente em vez de no servidor
        const docs = querySnapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
        docs.sort((a, b) => {
          const dateA = a.createdAt?.toDate?.() || new Date(0);
          const dateB = b.createdAt?.toDate?.() || new Date(0);
          return dateB - dateA; // Ordem decrescente
        });
        
        renderHistory(docs);
      }, (error) => {
        console.error('Erro ao carregar histórico:', error.code, error.message);
      });
      
    } catch(e) {
      console.error('Erro crítico:', e);
    }
  });
</script>
</body>
</html>
